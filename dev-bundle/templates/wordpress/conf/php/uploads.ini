; PHP Upload Settings for WordPress
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Session
session.gc_maxlifetime = 1440

; Display errors (for development)
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL
log_errors = On