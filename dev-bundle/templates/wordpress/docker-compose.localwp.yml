services:
  # NGINX Web Server (like LocalWP)
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    ports:
      - "${WP_PORT}:80"
      - "${WP_HTTPS_PORT}:443"
    volumes:
      - ./app/public:/var/www/html
      - ./conf/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
      - ./certs:/etc/nginx/certs
    depends_on:
      - wordpress
    networks:
      - devlauncher-network

  # WordPress with PHP-FPM (like LocalWP)
  wordpress:
    image: wordpress:6-fpm
    container_name: ${PROJECT_NAME}-wordpress
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DEBUG: 'true'
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_MAX_MEMORY_LIMIT', '512M');
        define('WP_HOME', 'http://localhost:${WP_PORT}');
        define('WP_SITEURL', 'http://localhost:${WP_PORT}');
    volumes:
      - ./app/public:/var/www/html
      - ./conf/php/php.ini:/usr/local/etc/php/php.ini
    networks:
      - devlauncher-network
    depends_on:
      - mysql

  # MySQL Database (like LocalWP)
  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}-mysql
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./app/sql:/var/lib/mysql
      - ./conf/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - devlauncher-network

  # phpMyAdmin (like LocalWP's Adminer)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${PROJECT_NAME}-phpmyadmin
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    networks:
      - devlauncher-network
    depends_on:
      - mysql

  # Mailhog for email testing (like LocalWP)
  mailhog:
    image: mailhog/mailhog
    container_name: ${PROJECT_NAME}-mailhog
    ports:
      - "${MAIL_PORT}:8025"
      - "${SMTP_PORT}:1025"
    networks:
      - devlauncher-network

  # WP-CLI (like LocalWP)
  wp-cli:
    image: wordpress:cli
    container_name: ${PROJECT_NAME}-wpcli
    volumes:
      - ./app/public:/var/www/html
      - ./wp-cli.yml:/var/www/html/wp-cli.yml
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    networks:
      - devlauncher-network
    depends_on:
      - mysql
      - wordpress
    entrypoint: ["tail", "-f", "/dev/null"]

networks:
  devlauncher-network:
    external: true