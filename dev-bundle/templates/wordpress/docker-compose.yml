networks:
  devlauncher-network:
    external: true

services:
  # WordPress with Apache
  wordpress:
    image: wordpress:6.8.2-apache
    container_name: {{PROJECT_NAME}}_wordpress
    restart: unless-stopped
    ports:
      - "{{WP_PORT}}:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: {{PROJECT_NAME}}_db
      WORDPRESS_DB_USER: {{PROJECT_NAME}}_user
      WORDPRESS_DB_PASSWORD: secure_password_123
      WORDPRESS_CONFIG_EXTRA: |
        /* Dynamic URL Support for Docker MCP Access */
        if (!empty($_SERVER['HTTP_HOST'])) {
            $protocol = (!empty($_SERVER['HTTPS']) && $_SERVER['HTTPS'] !== 'off') ? 'https://' : 'http://';
            $dynamic_url = $protocol . $_SERVER['HTTP_HOST'];
            define('WP_HOME', $dynamic_url);
            define('WP_SITEURL', $dynamic_url);
        }
        
        /* Development Settings */
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('AUTOMATIC_UPDATER_DISABLED', true);
        ini_set('memory_limit', '256M');
        ini_set('upload_max_filesize', '64M');
        ini_set('post_max_size', '64M');
        
        /* Email Settings */
        define('SMTP_HOST', 'mailpit');
        define('SMTP_PORT', 1025);
        define('SMTP_SECURE', '');
        
        /* Allow all hosts for Docker */
        if (!defined('WP_CLI')) {
            define('WP_ACCESSIBLE_HOSTS', '*');
        }
    volumes:
      - ./app/public:/var/www/html
      - ./conf/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devlauncher-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: {{PROJECT_NAME}}_mysql
    restart: unless-stopped
    ports:
      - "{{DB_PORT}}:3306"
    environment:
      MYSQL_DATABASE: {{PROJECT_NAME}}_db
      MYSQL_USER: {{PROJECT_NAME}}_user
      MYSQL_PASSWORD: secure_password_123
      MYSQL_ROOT_PASSWORD: root_password_123
    volumes:
      - ./app/sql:/var/lib/mysql
      - ./conf/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./logs/mysql:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devlauncher-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: {{PROJECT_NAME}}_phpmyadmin
    restart: unless-stopped
    ports:
      - "{{PMA_PORT}}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password_123
      MYSQL_ROOT_PASSWORD: root_password_123
    depends_on:
      - mysql
    networks:
      - devlauncher-network

  # Mailpit (Email Testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: {{PROJECT_NAME}}_mailpit
    restart: unless-stopped
    ports:
      - "{{MAIL_PORT}}:8025"  # Web UI
      - "{{SMTP_PORT}}:1025"  # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_MAX_RECIPIENTS: 50
    volumes:
      - ./app/mailpit:/data
    networks:
      - devlauncher-network

  # WP-CLI for WordPress management
  wpcli:
    image: wordpress:cli
    container_name: {{PROJECT_NAME}}_wpcli
    volumes:
      - ./app/public:/var/www/html
      - ./wp-cli.yml:/var/www/html/wp-cli.yml:ro
    depends_on:
      - wordpress
      - mysql
    networks:
      - devlauncher-network
    profiles:
      - cli
  


volumes:
  mysql_data:
    driver: local